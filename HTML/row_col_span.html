<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>table row col spanning</h1>
    <table border="5px" cellspacing="10px"  cellpadding="5px" >
        <thead>
            <tr>
                <th>PRODUCT</th>
                <th>FLAVOUR</th>

            </tr>
            <tr>
                <td rowspan="3">Milk</td>
                <td>Almond</td>
            </tr>
            <tr>
                <td>Mango</td>
            </tr>
            <tr>
                <td>Chocolate</td>
            </tr>
            <tr>
                <td colspan="2">Exclusive offer ❤️❤️❤️❤️❤️</td>
               
            </tr>
        </thead>
    </table>
    
</body>
</html>
