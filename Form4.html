<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form >
        <lable for="">first name *:</lable>
        <input type="text" minlength="3" maxlength="15" required placeholder="enter first name"> <br> <br>
        <lable for="">last name *:</lable>
        <input type="text" minlength="3" maxlength="15" required  autofocus placeholder="enter first name"> <br> <br>
        <lable for="">password:</lable>
        <input type="password" pattern="[A-Z]{1}[a-z]{2,5}[\W+]{1}[0-9]{2,}" > <br> <br>
        <lable for="">dob:</lable>
        <input type="date" min="2002-01-01" max="2026-01-01"> <br> <br>
        <lable for="">gender:</lable>
        <label for="">male</label>
        <input type="radio" name="gender" value="male">
        <label for="">female</label>
        <input type="radio" name="gender" value="female" checked>
        <label for="">others</label>
        <input type="radio" name="gender" value="others"><br> <br>
        <label for="">age:</label>
        <input type="number" min="18" max="32" step="2"><br> <br>
        <lable for="">State:</lable>
        <select name="state">
            <option disabled selected>select option</option>
            <option value="andhra">andhra</option>
            <option value="odisha">odisha</option>
            <option value="bihar">bihar</option>
            <option value="telengana">telengana</option>
            <option value="karnataka">karnataka</option>
            <option value="goa">goa</option>
            </select><br> <br>
            <label for="doc">upload document:</label>
            <input type="file" id="doc" accept="image/*,audio/*,vidio/*" multiple><br><br>
            <input type="text" disabled value="sabyasachi" name="username">


        <input type="submit">

    </form>
</body>
</html>
